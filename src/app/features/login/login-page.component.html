<div class="login-wrapper">
  <div class="login-card">
    <h1 class="login-title">beauty f<span class="oo">oo</span>rward</h1>
    <p class="login-subtitle">INVENTORY MANAGEMENT</p>

    <form (ngSubmit)="onSubmit()" class="login-form">
      @if (error()) {
        <div class="login-error">{{ error() }}</div>
      }

      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@beautyforward.org"
          required
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter password"
          required
        />
      </div>

      <button type="submit" class="btn-primary login-btn" [disabled]="submitting()">
        {{ submitting() ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
  </div>
</div>
