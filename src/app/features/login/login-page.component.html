<div class="login-wrapper">
  <div class="login-card">
    <div class="brand">
      <span class="brand-name">beauty<br />forward</span>
      <span class="brand-by">by beauty access</span>
    </div>
    <h1 class="login-title">welcome back</h1>
    <p class="login-eyebrow">inventory management</p>

    <form (ngSubmit)="onSubmit()" class="login-form">
      @if (error()) {
        <div class="login-error">{{ error() }}</div>
      }

      <div class="field">
        <label for="email">email</label>
        <input
          id="email"
          type="email"
          class="inp"
          [(ngModel)]="email"
          name="email"
          placeholder="you@beautyforward.org"
          required
        />
      </div>

      <div class="field">
        <label for="password">password</label>
        <input
          id="password"
          type="password"
          class="inp"
          [(ngModel)]="password"
          name="password"
          placeholder="enter password"
          required
        />
      </div>

      <button type="submit" class="btn primary login-btn" [disabled]="submitting()">
        {{ submitting() ? 'signing in…' : 'sign in →' }}
      </button>
    </form>
  </div>
</div>
